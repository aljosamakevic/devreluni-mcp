# Fly.io deployment config for the Vetoed MCP server.
#
# Secrets are set out-of-band via `flyctl secrets set` — see the
# commit message for this file and docs/OPERATIONS.md (T23/T24) for
# the canonical list and rotation runbook.
#
# One-time prereq BEFORE first `flyctl deploy`:
#   flyctl volumes create vetoed_data --size 1 --region iad
# The [mounts] block references this volume by name. If it doesn't
# exist at deploy time, SQLite writes go to ephemeral storage and
# tokens vanish on every restart.

app = "vetoed-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_TRANSPORT = "http"
  PORT = "3000"
  VETOED_DB_PATH = "/data/vetoed.db"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

[mounts]
  source = "vetoed_data"
  destination = "/data"

[deploy]
  strategy = "rolling"
