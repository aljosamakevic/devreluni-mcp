<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veto admin</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: #0b0d10;
        color: #e6e6e6;
        line-height: 1.5;
      }
      header {
        padding: 20px 32px;
        border-bottom: 1px solid #1f2933;
        background: #0f1216;
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }
      main {
        padding: 24px 32px;
        max-width: 1100px;
        margin: 0 auto;
      }
      section {
        margin-bottom: 36px;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #9aa4b1;
        margin: 0 0 12px 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #11161c;
        border: 1px solid #1f2933;
        border-radius: 6px;
        overflow: hidden;
      }
      th, td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid #1f2933;
        font-size: 13px;
        font-family: "SF Mono", Menlo, monospace;
      }
      th {
        background: #0f1216;
        color: #9aa4b1;
        font-weight: 600;
        font-family: inherit;
      }
      tr:last-child td { border-bottom: none; }
      tr.revoked td { color: #6b7480; text-decoration: line-through; }
      form {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }
      input[type="email"] {
        flex: 1;
        padding: 8px 10px;
        background: #11161c;
        color: #e6e6e6;
        border: 1px solid #1f2933;
        border-radius: 4px;
        font-size: 14px;
        font-family: inherit;
      }
      input[type="email"]:focus {
        outline: none;
        border-color: #4a8fe0;
      }
      button {
        padding: 8px 14px;
        background: #4a8fe0;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover { background: #3a7dcc; }
      button.danger {
        background: transparent;
        color: #e07a7a;
        border: 1px solid #3a1a1a;
        font-size: 12px;
        padding: 4px 10px;
      }
      button.danger:hover { background: #2a1212; }
      .empty {
        padding: 16px;
        color: #6b7480;
        font-style: italic;
        text-align: center;
        background: #11161c;
        border: 1px solid #1f2933;
        border-radius: 6px;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal {
        background: #11161c;
        border: 1px solid #1f2933;
        border-radius: 8px;
        padding: 24px;
        max-width: 560px;
        width: 90%;
      }
      .modal h3 { margin: 0 0 12px 0; font-size: 16px; }
      .modal .warning {
        background: #2a1f10;
        border: 1px solid #5a3a10;
        color: #e6c477;
        padding: 10px 12px;
        border-radius: 4px;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .modal .token-display {
        background: #0b0d10;
        border: 1px solid #1f2933;
        border-radius: 4px;
        padding: 12px;
        font-family: "SF Mono", Menlo, monospace;
        font-size: 13px;
        word-break: break-all;
        margin-bottom: 16px;
      }
      .modal .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .status-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-family: inherit;
        font-weight: 500;
      }
      .status-badge.active { background: #1a3a1a; color: #7ae07a; }
      .status-badge.revoked { background: #3a1a1a; color: #e07a7a; }
      .status-badge.error { background: #3a1a1a; color: #e07a7a; }
      .status-badge.ok { background: #1a3a1a; color: #7ae07a; }
      .status-badge.rate_limited { background: #3a2a10; color: #e6c477; }
      .status-badge.pending { background: #1a2a3a; color: #7aaee0; }
      .status-badge.approved { background: #1a3a1a; color: #7ae07a; }
      .status-badge.denied { background: #3a1a1a; color: #e07a7a; }

      /* Phase 04 D-03-5 — signup queue styles */
      .signup-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .signup-actions button {
        font-size: 12px;
        padding: 4px 10px;
      }
      button.approve {
        background: #2a7a2a;
      }
      button.approve:hover { background: #1f661f; }
      .referrer-cell {
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      textarea.admin-note {
        width: 100%;
        min-height: 80px;
        padding: 10px;
        background: #0b0d10;
        color: #e6e6e6;
        border: 1px solid #1f2933;
        border-radius: 4px;
        font-family: inherit;
        font-size: 13px;
        resize: vertical;
      }
      textarea.admin-note:focus {
        outline: none;
        border-color: #4a8fe0;
      }
      .modal .field-label {
        display: block;
        font-size: 12px;
        color: #9aa4b1;
        margin: 0 0 6px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #11161c;
        border: 1px solid #1f2933;
        color: #e6e6e6;
        padding: 12px 18px;
        border-radius: 6px;
        font-size: 13px;
        z-index: 200;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        max-width: 480px;
      }
      .toast.error { border-color: #5a2a2a; color: #e07a7a; }
      .toast.warn { border-color: #5a3a10; color: #e6c477; }
    </style>
  </head>
  <body>
    <header>
      <h1>Veto admin</h1>
    </header>
    <main>
      <section id="tokens-section">
        <h2>Tokens</h2>
        <form id="issue-form">
          <input
            type="email"
            id="issue-email"
            placeholder="alice@example.com"
            required
            autocomplete="off"
          >
          <button type="submit">Issue token</button>
        </form>
        <div id="tokens-table-wrap">
          <div class="empty">Loading tokens...</div>
        </div>
      </section>

      <section id="signup-pending-section">
        <h2>Access requests (pending)</h2>
        <div id="signup-pending-wrap">
          <div class="empty">Loading access requests...</div>
        </div>
      </section>

      <section id="signup-processed-section">
        <h2>Recently processed (last 20)</h2>
        <div id="signup-processed-wrap">
          <div class="empty">Loading...</div>
        </div>
      </section>

      <section id="usage-section">
        <h2>Recent usage (last 100)</h2>
        <div id="usage-table-wrap">
          <div class="empty">Loading usage...</div>
        </div>
      </section>
    </main>

    <script>
      // Phase 03 T29 — admin dashboard wiring.
      //
      // Vanilla JS, no framework. On load:
      //   * fetch /admin/api/tokens + /admin/api/usage and render tables
      //   * issue form POSTs /admin/api/tokens, shows plaintext in a
      //     one-time modal (warns it won't be shown again), then re-fetches.
      //   * revoke buttons DELETE the token, then re-fetch.
      //
      // credentials: 'include' carries the Basic-auth credentials the browser
      // captured when loading this page. No tokens stored in localStorage.

      (function () {
        'use strict';

        var tokensWrap = document.getElementById('tokens-table-wrap');
        var usageWrap = document.getElementById('usage-table-wrap');
        var issueForm = document.getElementById('issue-form');
        var issueEmail = document.getElementById('issue-email');
        var signupPendingWrap = document.getElementById('signup-pending-wrap');
        var signupProcessedWrap = document.getElementById('signup-processed-wrap');

        function esc(s) {
          if (s === null || s === undefined) return '';
          return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function fmtDate(iso) {
          if (!iso) return '—';
          try {
            return new Date(iso).toLocaleString();
          } catch (e) {
            return iso;
          }
        }

        function renderTokens(rows) {
          if (!rows || rows.length === 0) {
            tokensWrap.innerHTML = '<div class="empty">No tokens issued yet.</div>';
            return;
          }
          var html = '<table>'
            + '<thead><tr>'
            + '<th>ID</th><th>Prefix</th><th>Email</th><th>Created</th>'
            + '<th>Last used</th><th>Status</th><th></th>'
            + '</tr></thead><tbody>';
          for (var i = 0; i < rows.length; i++) {
            var r = rows[i];
            var rowClass = r.status === 'revoked' ? 'revoked' : '';
            var revokeBtn = r.status === 'active'
              ? '<button class="danger" data-revoke-id="' + esc(r.id) + '">Revoke</button>'
              : '';
            html += '<tr class="' + rowClass + '">'
              + '<td>' + esc(r.id) + '</td>'
              + '<td>' + esc(r.prefix) + '…</td>'
              + '<td>' + esc(r.email) + '</td>'
              + '<td>' + esc(fmtDate(r.created_at)) + '</td>'
              + '<td>' + esc(fmtDate(r.last_used_at)) + '</td>'
              + '<td><span class="status-badge ' + esc(r.status) + '">' + esc(r.status) + '</span></td>'
              + '<td>' + revokeBtn + '</td>'
              + '</tr>';
          }
          html += '</tbody></table>';
          tokensWrap.innerHTML = html;

          // Wire revoke buttons.
          var btns = tokensWrap.querySelectorAll('button[data-revoke-id]');
          for (var b = 0; b < btns.length; b++) {
            btns[b].addEventListener('click', onRevokeClick);
          }
        }

        function renderUsage(rows) {
          if (!rows || rows.length === 0) {
            usageWrap.innerHTML = '<div class="empty">No usage logged yet.</div>';
            return;
          }
          var html = '<table>'
            + '<thead><tr>'
            + '<th>When</th><th>Email</th><th>Tool</th>'
            + '<th>Status</th><th>Duration (ms)</th>'
            + '</tr></thead><tbody>';
          for (var i = 0; i < rows.length; i++) {
            var r = rows[i];
            html += '<tr>'
              + '<td>' + esc(fmtDate(r.created_at)) + '</td>'
              + '<td>' + esc(r.email || '—') + '</td>'
              + '<td>' + esc(r.tool_name) + '</td>'
              + '<td><span class="status-badge ' + esc(r.status) + '">' + esc(r.status) + '</span></td>'
              + '<td>' + esc(r.duration_ms) + '</td>'
              + '</tr>';
          }
          html += '</tbody></table>';
          usageWrap.innerHTML = html;
        }

        function loadTokens() {
          return fetch('/admin/api/tokens', { credentials: 'include' })
            .then(function (res) {
              if (!res.ok) throw new Error('tokens fetch failed: ' + res.status);
              return res.json();
            })
            .then(renderTokens)
            .catch(function (err) {
              tokensWrap.innerHTML = '<div class="empty">Failed to load tokens: ' + esc(err.message) + '</div>';
            });
        }

        function loadUsage() {
          return fetch('/admin/api/usage', { credentials: 'include' })
            .then(function (res) {
              if (!res.ok) throw new Error('usage fetch failed: ' + res.status);
              return res.json();
            })
            .then(renderUsage)
            .catch(function (err) {
              usageWrap.innerHTML = '<div class="empty">Failed to load usage: ' + esc(err.message) + '</div>';
            });
        }

        function showTokenModal(plaintext) {
          var backdrop = document.createElement('div');
          backdrop.className = 'modal-backdrop';
          backdrop.innerHTML =
            '<div class="modal" role="dialog" aria-labelledby="modal-title">'
              + '<h3 id="modal-title">New token issued</h3>'
              + '<div class="warning">Save this token now — it will not be shown again. The server stores only a hash.</div>'
              + '<div class="token-display" id="modal-token"></div>'
              + '<div class="actions">'
                + '<button type="button" id="modal-copy">Copy</button>'
                + '<button type="button" id="modal-close">Close</button>'
              + '</div>'
            + '</div>';
          document.body.appendChild(backdrop);
          // Plaintext is set via textContent (never innerHTML) to avoid any
          // possibility of injection from a server-controlled string.
          document.getElementById('modal-token').textContent = plaintext;

          var copyBtn = document.getElementById('modal-copy');
          var closeBtn = document.getElementById('modal-close');
          copyBtn.addEventListener('click', function () {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(plaintext).then(function () {
                copyBtn.textContent = 'Copied';
                setTimeout(function () { copyBtn.textContent = 'Copy'; }, 1500);
              });
            }
          });
          closeBtn.addEventListener('click', function () {
            document.body.removeChild(backdrop);
          });
        }

        // Phase 04 D-03-5 — signup queue wiring -----------------------------------

        function showToast(message, kind) {
          var t = document.createElement('div');
          t.className = 'toast' + (kind ? ' ' + kind : '');
          t.textContent = message;
          document.body.appendChild(t);
          setTimeout(function () {
            if (t.parentNode) t.parentNode.removeChild(t);
          }, 6000);
        }

        function renderSignupPending(rows) {
          if (!rows || rows.length === 0) {
            signupPendingWrap.innerHTML = '<div class="empty">No access requests pending.</div>';
            return;
          }
          var html = '<table>'
            + '<thead><tr>'
            + '<th>ID</th><th>Email</th><th>Referrer</th>'
            + '<th>Requested</th><th></th>'
            + '</tr></thead><tbody>';
          for (var i = 0; i < rows.length; i++) {
            var r = rows[i];
            var ref = r.referrer || '';
            html += '<tr>'
              + '<td>' + esc(r.id) + '</td>'
              + '<td>' + esc(r.email) + '</td>'
              + '<td class="referrer-cell" title="' + esc(ref) + '">' + esc(ref || '—') + '</td>'
              + '<td>' + esc(fmtDate(r.created_at)) + '</td>'
              + '<td><div class="signup-actions">'
                + '<button class="approve" data-approve-id="' + esc(r.id) + '" data-email="' + esc(r.email) + '">Approve</button>'
                + '<button class="danger" data-deny-id="' + esc(r.id) + '">Deny</button>'
              + '</div></td>'
              + '</tr>';
          }
          html += '</tbody></table>';
          signupPendingWrap.innerHTML = html;

          var approveBtns = signupPendingWrap.querySelectorAll('button[data-approve-id]');
          for (var a = 0; a < approveBtns.length; a++) {
            approveBtns[a].addEventListener('click', onApproveClick);
          }
          var denyBtns = signupPendingWrap.querySelectorAll('button[data-deny-id]');
          for (var d = 0; d < denyBtns.length; d++) {
            denyBtns[d].addEventListener('click', onDenyClick);
          }
        }

        function renderSignupProcessed(rows) {
          if (!rows || rows.length === 0) {
            signupProcessedWrap.innerHTML = '<div class="empty">Nothing processed yet.</div>';
            return;
          }
          var html = '<table>'
            + '<thead><tr>'
            + '<th>ID</th><th>Email</th><th>Status</th>'
            + '<th>Decided</th><th>Note</th>'
            + '</tr></thead><tbody>';
          for (var i = 0; i < rows.length; i++) {
            var r = rows[i];
            html += '<tr>'
              + '<td>' + esc(r.id) + '</td>'
              + '<td>' + esc(r.email) + '</td>'
              + '<td><span class="status-badge ' + esc(r.status) + '">' + esc(r.status) + '</span></td>'
              + '<td>' + esc(fmtDate(r.status_changed_at)) + '</td>'
              + '<td class="referrer-cell" title="' + esc(r.admin_note || '') + '">'
                + esc(r.admin_note || '—')
              + '</td>'
              + '</tr>';
          }
          html += '</tbody></table>';
          signupProcessedWrap.innerHTML = html;
        }

        function loadSignupPending() {
          return fetch('/admin/api/signup-requests?status=pending', { credentials: 'include' })
            .then(function (res) {
              if (!res.ok) throw new Error('pending fetch failed: ' + res.status);
              return res.json();
            })
            .then(renderSignupPending)
            .catch(function (err) {
              signupPendingWrap.innerHTML =
                '<div class="empty">Failed to load access requests: ' + esc(err.message) + '</div>';
            });
        }

        function loadSignupProcessed() {
          // Fetch approved + denied separately, merge, sort by status_changed_at DESC, take 20.
          return Promise.all([
            fetch('/admin/api/signup-requests?status=approved', { credentials: 'include' }).then(function (r) {
              return r.ok ? r.json() : [];
            }),
            fetch('/admin/api/signup-requests?status=denied', { credentials: 'include' }).then(function (r) {
              return r.ok ? r.json() : [];
            })
          ])
            .then(function (parts) {
              var merged = parts[0].concat(parts[1]);
              merged.sort(function (a, b) {
                var ax = a.status_changed_at || a.created_at || '';
                var bx = b.status_changed_at || b.created_at || '';
                if (ax < bx) return 1;
                if (ax > bx) return -1;
                return 0;
              });
              renderSignupProcessed(merged.slice(0, 20));
            })
            .catch(function (err) {
              signupProcessedWrap.innerHTML =
                '<div class="empty">Failed to load processed: ' + esc(err.message) + '</div>';
            });
        }

        function onApproveClick(ev) {
          var id = ev.currentTarget.getAttribute('data-approve-id');
          var email = ev.currentTarget.getAttribute('data-email');
          if (!id) return;

          // Build confirm modal with admin-note textarea.
          var backdrop = document.createElement('div');
          backdrop.className = 'modal-backdrop';
          backdrop.innerHTML =
            '<div class="modal" role="dialog" aria-labelledby="approve-modal-title">'
              + '<h3 id="approve-modal-title">Approve access request</h3>'
              + '<p>Issue a token for <strong></strong> and email it now?</p>'
              + '<label class="field-label" for="approve-note">Optional admin note (renders above the standard email)</label>'
              + '<textarea class="admin-note" id="approve-note" placeholder="e.g. Hey Alice — saw your tweet, welcome aboard."></textarea>'
              + '<div class="actions" style="margin-top:16px;">'
                + '<button type="button" id="approve-cancel" class="danger" style="font-size:14px;padding:8px 14px;">Cancel</button>'
                + '<button type="button" id="approve-confirm" class="approve" style="font-size:14px;padding:8px 14px;">Approve &amp; email</button>'
              + '</div>'
            + '</div>';
          document.body.appendChild(backdrop);
          // textContent = safe insertion of the admin-controlled email value.
          backdrop.querySelector('strong').textContent = email || '';

          var note = document.getElementById('approve-note');
          note.focus();
          var cancelBtn = document.getElementById('approve-cancel');
          var confirmBtn = document.getElementById('approve-confirm');

          function close() {
            if (backdrop.parentNode) backdrop.parentNode.removeChild(backdrop);
          }

          cancelBtn.addEventListener('click', close);
          confirmBtn.addEventListener('click', function () {
            confirmBtn.disabled = true;
            confirmBtn.textContent = 'Approving...';
            fetch('/admin/api/signup-requests/' + encodeURIComponent(id) + '/approve', {
              method: 'POST',
              credentials: 'include',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ admin_note: note.value || '' })
            })
              .then(function (res) {
                if (!res.ok) {
                  return res.json().then(function (body) {
                    throw new Error(body.error || ('http_' + res.status));
                  });
                }
                return res.json();
              })
              .then(function (body) {
                close();
                if (body.email_sent) {
                  showToast('Approved ' + (email || id) + ' — token ' + body.token_prefix + '… emailed.');
                } else {
                  showToast(
                    'Approved ' + (email || id) + ' — token ' + body.token_prefix + '… minted, but email failed (' + (body.email_error || 'unknown') + '). Copy from DB.',
                    'warn'
                  );
                }
                loadSignupPending();
                loadSignupProcessed();
                loadTokens();
              })
              .catch(function (err) {
                close();
                showToast('Approve failed: ' + err.message, 'error');
              });
          });
        }

        function onDenyClick(ev) {
          var id = ev.currentTarget.getAttribute('data-deny-id');
          if (!id) return;
          if (!confirm('Mark this request as denied? No email will be sent.')) return;
          fetch('/admin/api/signup-requests/' + encodeURIComponent(id) + '/deny', {
            method: 'POST',
            credentials: 'include'
          })
            .then(function (res) {
              if (!res.ok) throw new Error('deny failed: ' + res.status);
              return res.json();
            })
            .then(function () {
              showToast('Request ' + id + ' denied.');
              loadSignupPending();
              loadSignupProcessed();
            })
            .catch(function (err) {
              showToast('Deny failed: ' + err.message, 'error');
            });
        }

        // --- end signup wiring ----------------------------------------------------

        function onIssueSubmit(ev) {
          ev.preventDefault();
          var email = (issueEmail.value || '').trim();
          if (!email) return;
          fetch('/admin/api/tokens', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
          })
            .then(function (res) {
              if (!res.ok) {
                return res.json().then(function (body) {
                  throw new Error(body.reason || ('http_' + res.status));
                });
              }
              return res.json();
            })
            .then(function (body) {
              issueEmail.value = '';
              showTokenModal(body.token);
              return loadTokens();
            })
            .catch(function (err) {
              alert('Failed to issue token: ' + err.message);
            });
        }

        function onRevokeClick(ev) {
          var id = ev.currentTarget.getAttribute('data-revoke-id');
          if (!id) return;
          if (!confirm('Revoke token ' + id + '? Active sessions using it will start failing.')) {
            return;
          }
          fetch('/admin/api/tokens/' + encodeURIComponent(id), {
            method: 'DELETE',
            credentials: 'include'
          })
            .then(function (res) {
              if (!res.ok) throw new Error('revoke failed: ' + res.status);
              return loadTokens();
            })
            .catch(function (err) {
              alert('Revoke failed: ' + err.message);
            });
        }

        issueForm.addEventListener('submit', onIssueSubmit);
        loadTokens();
        loadUsage();
        loadSignupPending();
        loadSignupProcessed();
      })();
    </script>
  </body>
</html>
