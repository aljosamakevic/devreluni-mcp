<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vetoed admin</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        background: #0b0d10;
        color: #e6e6e6;
        line-height: 1.5;
      }
      header {
        padding: 20px 32px;
        border-bottom: 1px solid #1f2933;
        background: #0f1216;
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
      }
      main {
        padding: 24px 32px;
        max-width: 1100px;
        margin: 0 auto;
      }
      section {
        margin-bottom: 36px;
      }
      h2 {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #9aa4b1;
        margin: 0 0 12px 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #11161c;
        border: 1px solid #1f2933;
        border-radius: 6px;
        overflow: hidden;
      }
      th, td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid #1f2933;
        font-size: 13px;
        font-family: "SF Mono", Menlo, monospace;
      }
      th {
        background: #0f1216;
        color: #9aa4b1;
        font-weight: 600;
        font-family: inherit;
      }
      tr:last-child td { border-bottom: none; }
      tr.revoked td { color: #6b7480; text-decoration: line-through; }
      form {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
      }
      input[type="email"] {
        flex: 1;
        padding: 8px 10px;
        background: #11161c;
        color: #e6e6e6;
        border: 1px solid #1f2933;
        border-radius: 4px;
        font-size: 14px;
        font-family: inherit;
      }
      input[type="email"]:focus {
        outline: none;
        border-color: #4a8fe0;
      }
      button {
        padding: 8px 14px;
        background: #4a8fe0;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover { background: #3a7dcc; }
      button.danger {
        background: transparent;
        color: #e07a7a;
        border: 1px solid #3a1a1a;
        font-size: 12px;
        padding: 4px 10px;
      }
      button.danger:hover { background: #2a1212; }
      .empty {
        padding: 16px;
        color: #6b7480;
        font-style: italic;
        text-align: center;
        background: #11161c;
        border: 1px solid #1f2933;
        border-radius: 6px;
      }
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal {
        background: #11161c;
        border: 1px solid #1f2933;
        border-radius: 8px;
        padding: 24px;
        max-width: 560px;
        width: 90%;
      }
      .modal h3 { margin: 0 0 12px 0; font-size: 16px; }
      .modal .warning {
        background: #2a1f10;
        border: 1px solid #5a3a10;
        color: #e6c477;
        padding: 10px 12px;
        border-radius: 4px;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .modal .token-display {
        background: #0b0d10;
        border: 1px solid #1f2933;
        border-radius: 4px;
        padding: 12px;
        font-family: "SF Mono", Menlo, monospace;
        font-size: 13px;
        word-break: break-all;
        margin-bottom: 16px;
      }
      .modal .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .status-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-family: inherit;
        font-weight: 500;
      }
      .status-badge.active { background: #1a3a1a; color: #7ae07a; }
      .status-badge.revoked { background: #3a1a1a; color: #e07a7a; }
      .status-badge.error { background: #3a1a1a; color: #e07a7a; }
      .status-badge.ok { background: #1a3a1a; color: #7ae07a; }
      .status-badge.rate_limited { background: #3a2a10; color: #e6c477; }
    </style>
  </head>
  <body>
    <header>
      <h1>Vetoed admin</h1>
    </header>
    <main>
      <section id="tokens-section">
        <h2>Tokens</h2>
        <form id="issue-form">
          <input
            type="email"
            id="issue-email"
            placeholder="alice@example.com"
            required
            autocomplete="off"
          >
          <button type="submit">Issue token</button>
        </form>
        <div id="tokens-table-wrap">
          <div class="empty">Loading tokens...</div>
        </div>
      </section>

      <section id="usage-section">
        <h2>Recent usage (last 100)</h2>
        <div id="usage-table-wrap">
          <div class="empty">Loading usage...</div>
        </div>
      </section>
    </main>

    <!-- T29 wires the vanilla JS that calls /admin/api/* and renders the tables. -->
  </body>
</html>
