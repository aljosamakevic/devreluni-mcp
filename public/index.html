<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veto — Kill bad ideas before you build them</title>
    <meta
      name="description"
      content="An MCP server that validates product ideas across five structured gates. Five gates. One verdict. No cheerleading."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap">
    <style>
      /* ─────────────────────────────────────────────────────────────────
         Phase 06 T01 — BRAND.md design tokens.
         Single source of palette/type/spacing for the landing page.
         Any change to BRAND.md color or typography lands here first.
         Per CONTEXT.md decision 10: vanilla CSS, no framework.
         Per executor judgment: inline <style> block (file < 800 lines
         total even after Stream A — multi-file CSS not warranted).
         ───────────────────────────────────────────────────────────────── */
      :root {
        /* Color — BRAND.md palette, single accent */
        --bg: #111210;
        --surface: #1A1A18;
        --border: rgba(245, 244, 240, 0.10);
        --border-emphasis: rgba(245, 244, 240, 0.20);
        --text: #F5F4F0;
        --text-secondary: rgba(245, 244, 240, 0.55);
        --text-tertiary: rgba(245, 244, 240, 0.30);
        --text-muted: rgba(245, 244, 240, 0.18);
        --accent: #D4F233;
        --accent-bg: rgba(212, 242, 51, 0.10);
        --status-fail: #FF6B55;
        --status-fail-bg: rgba(255, 107, 85, 0.10);
        --status-inc: #FFB828;
        --status-inc-bg: rgba(255, 184, 40, 0.10);

        /* Tier color map (BRAND.md "Tier color map") */
        --tier-s-text: #D4F233;
        --tier-s-bg: rgba(212, 242, 51, 0.12);
        --tier-a-text: #7DC8FF;
        --tier-a-bg: rgba(99, 195, 255, 0.12);
        --tier-b-text: #AAAAAA;
        --tier-b-bg: rgba(150, 150, 130, 0.15);
        --tier-c-text: #FFB828;
        --tier-c-bg: rgba(255, 184, 40, 0.10);
        --tier-d-text: #FF6B55;
        --tier-d-bg: rgba(255, 107, 85, 0.10);

        /* Spacing scale (4/8/12/16/24/32/48/64/96/128px) */
        --s-1: 4px;
        --s-2: 8px;
        --s-3: 12px;
        --s-4: 16px;
        --s-5: 24px;
        --s-6: 32px;
        --s-7: 48px;
        --s-8: 64px;
        --s-9: 96px;
        --s-10: 128px;

        /* Type scale */
        --fs-hero: 48px;
        --fs-section: 28px;
        --fs-sub: 20px;
        --fs-body: 16px;
        --fs-body-sm: 14px;
        --fs-eyebrow: 10px;
        --fs-stamp: 64px;
        --fs-gate-id: 10px;
        --fs-mono: 13px;

        /* Border radius — BRAND.md "2px or less" */
        --radius: 2px;
        --radius-badge: 1px;

        /* Font stacks — Google Fonts (DM Mono + Inter), system fallback */
        --font-mono: "DM Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;

        /* Layout */
        --max-width: 1200px;
        --gutter: 32px;
      }

      /* ─────────────────────────────────────────────────────────────────
         Reset + base typography
         ───────────────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      html { background: var(--bg); }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: var(--fs-body);
        line-height: 1.65;
        letter-spacing: -0.01em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      a { color: inherit; text-decoration: none; }
      a:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      img { max-width: 100%; display: block; }
      ::selection { background: var(--accent); color: var(--bg); }

      .wordmark {
        font-family: var(--font-mono);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        color: var(--text);
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <!-- Skeleton lands in T02. T01 is tokens-only. -->
    <span class="wordmark" style="padding: 48px;">VETO</span>
  </body>
</html>
